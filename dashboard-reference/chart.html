<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Gorilla Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background-color: #f8f9fa;
}

.chart-card {
  min-height: 420px;
}

.chart-wrap {
  position: relative;
  height: 320px;
}
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="dashboard.html">
      🦍 Food Gorilla
    </a>

    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="dashboard.html">
        Dashboard
      </a>

      <a class="nav-link active" href="chart.html">
        Analytics
      </a>
    </div>

  </div>
</nav>

<div class="container py-4">

  <h1 class="mb-4">Analytics</h1>

  <div class="row">

    <!-- Macro Progress Pie Chart -->
    <div class="col-lg-6 mb-4">

      <div class="card shadow-sm chart-card">
        <div class="card-body">

          <h3 class="h5">Today's Macro Progress</h3>

          <div class="chart-wrap">
            <canvas id="macroPieChart"></canvas>
          </div>

        </div>
      </div>

    </div>

    <!-- Weekly Nutrition Bar Chart -->
    <div class="col-lg-6 mb-4">

      <div class="card shadow-sm chart-card">
        <div class="card-body">

          <h3 class="h5">Weekly Nutrition Summary</h3>

          <div class="chart-wrap">
            <canvas id="weeklyBarChart"></canvas>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>

<script>

const dashboard = {

  progress: [
    { label: "Calories", consumed: 1800, target: 2200 },
    { label: "Protein", consumed: 165, target: 150 },
    { label: "Carbs", consumed: 190, target: 250 },
    { label: "Fats", consumed: 55, target: 80 }
  ],

  weekly: [
    { date: "Mon", calories: 2000 },
    { date: "Tue", calories: 2400 },
    { date: "Wed", calories: 1800 },
    { date: "Thu", calories: 2200 },
    { date: "Fri", calories: 2500 },
    { date: "Sat", calories: 3000 },
    { date: "Sun", calories: 1500 }
  ]

};

// ----------------
// Macro Pie Chart
// ----------------

const macroColors = ["#fd7e14", "#dc3545", "#ffc107", "#198754"];

new Chart(document.getElementById("macroPieChart"), {
  type: "pie",
  data: {
    labels: dashboard.progress.map(item => item.label),
    datasets: [{
      data: dashboard.progress.map(item => item.consumed),
      backgroundColor: macroColors,
      borderColor: "#fff",
      borderWidth: 2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: "bottom"
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            const item = dashboard.progress[context.dataIndex];
            return `${item.label}: ${item.consumed} / ${item.target}`;
          }
        }
      }
    }
  }
});

// ----------------
// Weekly Bar Chart
// ----------------

new Chart(document.getElementById("weeklyBarChart"), {
  type: "bar",
  data: {
    labels: dashboard.weekly.map(day => day.date),
    datasets: [{
      label: "Calories",
      data: dashboard.weekly.map(day => day.calories),
      backgroundColor: "#0d6efd",
      borderRadius: 6
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: false
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        title: {
          display: true,
          text: "Calories (kcal)"
        }
      }
    }
  }
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
